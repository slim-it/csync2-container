name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CSYNC2_VERSION: 2.0-42-g83b3644-4
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/csync2-container

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          build-args: |
            CSYNC2_VERSION=${{ env.CSYNC2_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.CSYNC2_VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.CSYNC2_VERSION }}-${{ github.sha }}
