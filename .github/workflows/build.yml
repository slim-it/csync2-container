name: Build container

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Read csync2 version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Release tag: the packaged version without the snapshot hash and
          # packaging revision (2.0-42-g83b3644-4 -> 2.0.42), so Renovate
          # orders it with no extra configuration.
          echo "release=$(sed -E 's/-g[0-9a-f]+-[0-9]+$//; s/-/./g' <<<"$version")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/slim-it/csync2-container
          tags: |
            type=raw,value=${{ steps.version.outputs.release }}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CSYNC2_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
